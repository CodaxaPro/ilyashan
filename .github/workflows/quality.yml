name: Quality Checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (Pricing & Validation)
        run: npm run test

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: CI=1 npm run test:e2e
        env:
          PORT: "3001"
